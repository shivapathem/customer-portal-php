name: Customer Portal CI/CD Pipeline
 
on:
  push:
    branches:
      - main
 
jobs:
 
  build:
 
    name: Build Application
    runs-on: ubuntu-latest
 
    steps:
 
      - name: Checkout Repository
        uses: actions/checkout@v3
 
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
 
      - name: Run Application
        run: php src/index.php
 
 
  validate-db:
 
    name: Validate Database Scripts
    runs-on: ubuntu-latest
    needs: build
 
    steps:
 
      - name: Checkout Repository
        uses: actions/checkout@v3
 
      - name: Validate SQL Scripts
        run: |
          echo "Checking database scripts..."
          for file in database/*.sql
          do
            echo "Validating $file"
          done
 
 
  deploy-nonprod:
 
    name: Deploy to Non Prod
    runs-on: ubuntu-latest
    needs: validate-db
 
    steps:
 
      - name: Checkout Repository
        uses: actions/checkout@v3
 
      - name: Load Non Prod Configuration
        run: |
          echo "Loading NON PROD configuration"
          cat config/config-dev.php
 
      - name: Deploy Application to Non Prod
        run: |
          echo "Deploying application to NON PROD"
          php src/index.php
 
 
  deploy-prod:
 
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-nonprod
 
    steps:
 
      - name: Checkout Repository
        uses: actions/checkout@v3
 
      - name: Load Production Configuration
        run: |
          echo "Loading PROD configuration"
          cat config/config-prod.php
 
      - name: Deploy Application to Production
        run: |
          echo "Deploying application to PROD"
          php src/index.php
 
 
  rollback:
 
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: failure()
 
    steps:
 
      - name: Checkout Repository
        uses: actions/checkout@v3
 
      - name: Execute Rollback Script
        run: |
          echo "Running rollback script..."
          cat rollback/rollback.sql
